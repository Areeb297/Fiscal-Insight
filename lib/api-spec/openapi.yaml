      responses:
        "204":
          description: Deleted

  /projections/{id}/invoices/generate:
    post:
      operationId: generateProjectionInvoices
      tags: [invoices]
      summary: Generate monthly invoices for a projection over a date range (idempotent per projection/client/month)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateInvoicesBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateInvoicesResponse"

