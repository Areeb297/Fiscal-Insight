openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Department Projection API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: projections
  - name: employees
  - name: subscriptions
  - name: salesSupport
  - name: vendorSetupFees
  - name: infrastructureCosts
  - name: quotations
  - name: admin
  - name: chat
  - name: dashboard
  - name: invoices

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projections:
    get:
      operationId: listProjections
      tags: [projections]
      summary: List all projections
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Projection"
    post:
      operationId: createProjection
      tags: [projections]
      summary: Create a projection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Projection"

  /projections/{id}:
    get:
      operationId: getProjection
      tags: [projections]
      summary: Get a projection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Projection"
    put:
      operationId: updateProjection
      tags: [projections]
      summary: Update projection settings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectionBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Projection"
    delete:
      operationId: deleteProjection
      tags: [projections]
      summary: Delete a projection (cascades to employees, subscriptions, sales-support)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projections/{id}/summary:
    get:
      operationId: getProjectionSummary
      tags: [dashboard]
      summary: Full computed projection summary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
