kind = "web"
previewPath = "/"
title = "Department Projection"
version = "1.0.0"
id = "artifacts/projection-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23181

[services.development]
run = "pnpm --filter @workspace/projection-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/projection-app", "run", "build" ]
publicDir = "artifacts/projection-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23181"
BASE_PATH = "/"
